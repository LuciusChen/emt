name: Build dynamic module

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            lib: libemt_module.dylib
            artifact: libEMT-aarch64-apple-darwin.dylib
          - os: macos-13
            target: x86_64-apple-darwin
            lib: libemt_module.dylib
            artifact: libEMT-x86_64-apple-darwin.dylib
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib: libemt_module.so
            artifact: libEMT-x86_64-unknown-linux-gnu.so
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            lib: emt_module.dll
            artifact: libEMT-x86_64-pc-windows-msvc.dll

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm -y

      - name: Build
        working-directory: module
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: cp module/target/${{ matrix.target }}/release/${{ matrix.lib }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
