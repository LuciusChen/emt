name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release without a leading v, for example 0.1.1"
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: macos-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: dtolnay/rust-toolchain@stable

      - uses: purcell/setup-emacs@master
        with:
          version: 30.2

      - name: Validate version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="${{ inputs.version }}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must look like 0.1.1 without a leading v" >&2
            exit 1
          fi

          tag="v${version}"
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists locally" >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Update version files
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          perl -0pi -e 's/;; Version: [0-9]+\.[0-9]+\.[0-9]+/;; Version: $ENV{VERSION}/' emt.el
          perl -0pi -e 's/\(defconst emt--module-version "v[0-9]+\.[0-9]+\.[0-9]+"/(defconst emt--module-version "v$ENV{VERSION}"/' emt.el
          perl -0pi -e 's/^version = "[0-9]+\.[0-9]+\.[0-9]+"$/version = "$ENV{VERSION}"/m' module/Cargo.toml

      - name: Build native module
        working-directory: module
        run: cargo build --release

      - name: Run ERT tests
        run: |
          emacs -Q --batch \
            -L . \
            -L test \
            -l test/emt-test.el \
            -f ert-run-tests-batch-and-exit

      - name: Byte compile
        run: |
          emacs -Q --batch \
            -L . \
            -f batch-byte-compile \
            emt.el \
            test/emt-test.el

      - name: Commit and tag release
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add emt.el module/Cargo.toml module/Cargo.lock

          if git diff --cached --quiet; then
            echo "No version changes to commit" >&2
            exit 1
          fi

          git commit -m "Release ${TAG}"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin HEAD:main
          git push origin "${TAG}"

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            lib: libemt_module.dylib
            artifact: libEMT-aarch64-apple-darwin.dylib
          - os: macos-latest
            target: x86_64-apple-darwin
            lib: libemt_module.dylib
            artifact: libEMT-x86_64-apple-darwin.dylib
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib: libemt_module.so
            artifact: libEMT-x86_64-unknown-linux-gnu.so
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            lib: emt_module.dll
            artifact: libEMT-x86_64-pc-windows-msvc.dll

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm -y

      - name: Build
        working-directory: module
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: cp module/target/${{ matrix.target }}/release/${{ matrix.lib }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*
